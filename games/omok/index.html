<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오목</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="omok-app">
        <section class="game-header">
            <div>
                <p class="eyebrow">Renju rule</p>
                <h1>오목</h1>
                <p>흑돌은 정확히 5목만 승리하며, 33, 44, 장목 금수가 적용됩니다.</p>
            </div>
            <div class="score-board" aria-label="점수">
                <div>
                    <span>흑돌</span>
                    <strong id="blackScore">0</strong>
                </div>
                <div>
                    <span>백돌</span>
                    <strong id="whiteScore">0</strong>
                </div>
            </div>
        </section>

        <section class="game-layout">
            <div class="board-card" aria-label="15x15 오목판">
                <div id="board" class="board"></div>
            </div>

            <aside class="side-panel">
                <section class="status-card">
                    <span class="status-label">현재 차례</span>
                    <div class="turn-view">
                        <span id="turnStone" class="turn-stone black"></span>
                        <strong id="turnText">흑돌</strong>
                    </div>
                    <p id="gameMessage">흑돌 차례입니다.</p>
                </section>

                <div class="controls">
                    <button id="newGameButton" class="button primary" type="button">새 게임</button>
                    <button id="undoButton" class="button ghost" type="button">무르기</button>
                </div>

                <section class="rules-card">
                    <h2>규칙</h2>
                    <ul>
                        <li>흑돌부터 시작합니다.</li>
                        <li>흑돌은 33, 44, 장목이 금수입니다.</li>
                        <li>금수 돌은 제거되고 턴은 넘어가지 않습니다.</li>
                        <li>백돌은 5목 이상이면 승리합니다.</li>
                    </ul>
                </section>
            </aside>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
