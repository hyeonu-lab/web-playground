<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오목</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="game-app" id="omok">
        <section class="game-header">
            <div>
                <p class="eyebrow">Now playing</p>
                <h1>오목</h1>
                <p>빈 칸을 클릭해서 돌을 놓으세요. 흑돌이 먼저 시작합니다.</p>
            </div>
            <div class="score-board" id="ranking">
                <div>
                    <span>흑돌</span>
                    <strong id="blackScore">0</strong>
                </div>
                <div>
                    <span>백돌</span>
                    <strong id="whiteScore">0</strong>
                </div>
            </div>
        </section>

        <div class="game-layout">
            <section class="board-shell" aria-label="오목판">
                <div class="omok-board" id="board"></div>
            </section>

            <aside class="game-side">
                <div class="turn-card">
                    <span class="turn-label">현재 차례</span>
                    <div class="turn-player">
                        <span class="turn-stone black" id="turnStone"></span>
                        <strong id="turnText">흑돌</strong>
                    </div>
                    <p id="gameMessage">원하는 칸을 선택하세요.</p>
                </div>

                <div class="control-grid">
                    <button class="button primary" type="button" id="newGameButton">새 게임</button>
                    <button class="button ghost" type="button" id="undoButton">무르기</button>
                </div>

                <div class="rules-card">
                    <h2>게임 규칙</h2>
                    <ul>
                        <li>흑돌부터 시작합니다.</li>
                        <li>같은 돌 5개가 일직선이면 승리합니다.</li>
                        <li>흑돌은 6목이면 백돌이 승리합니다.</li>
                        <li>흑돌은 33, 44 금수가 적용됩니다.</li>
                        <li>백돌은 금수 제한 없이 5목 이상이면 승리합니다.</li>
                    </ul>
                </div>
            </aside>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
