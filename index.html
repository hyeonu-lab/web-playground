<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쉬는시간 게임방</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="/" aria-label="쉬는시간 게임방">
            <span class="brand-mark">休</span>
            <span>쉬는시간 게임방</span>
        </a>
        <nav class="site-nav" aria-label="주요 메뉴">
            <a href="#games">게임 목록</a>
            <a href="#play">플레이</a>
        </nav>
    </header>

    <main>
        <section class="intro">
            <p class="eyebrow">Break time arcade</p>
            <h1>iframe으로 독립 실행되는 미니 게임 플랫폼</h1>
            <p>
                메인 사이트는 게임 목록과 실행 영역만 담당합니다.
                각 게임은 <code>games/게임명/</code> 폴더 안에서 독립 HTML, CSS, JavaScript로 관리됩니다.
            </p>
        </section>

        <section class="game-list" id="games" aria-labelledby="gameListTitle">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">Game shelf</p>
                    <h2 id="gameListTitle">게임 목록</h2>
                </div>
            </div>

            <div class="game-grid">
                <button class="game-card active" type="button" data-game-src="/games/omok/index.html" data-game-title="오목">
                    <span class="tag live">Live</span>
                    <strong>오목</strong>
                    <span>15x15 보드에서 흑백이 번갈아 두는 렌주룰 오목입니다.</span>
                </button>

                <button class="game-card" type="button" data-game-src="" data-game-title="Snake" disabled>
                    <span class="tag soon">Soon</span>
                    <strong>Snake</strong>
                    <span><code>games/snake/</code> 폴더를 추가해 연결할 수 있습니다.</span>
                </button>

                <button class="game-card" type="button" data-game-src="" data-game-title="Tetris" disabled>
                    <span class="tag soon">Soon</span>
                    <strong>Tetris</strong>
                    <span><code>games/tetris/</code> 폴더를 추가해 연결할 수 있습니다.</span>
                </button>
            </div>
        </section>

        <section class="play-section" id="play" aria-labelledby="playTitle">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">Now playing</p>
                    <h2 id="playTitle">오목</h2>
                </div>
            </div>

            <div class="frame-card">
                <iframe id="gameFrame" src="/games/omok/index.html" title="오목 게임"></iframe>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
